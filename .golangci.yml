version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  settings:
    staticcheck:
      # SA5008 flags duplicate struct tags, but go-flags (our CLI parser)
      # uses multiple `choice:` tags per field to constrain enum values.
      # Can't be avoided without rewriting flag definitions.
      checks: ["all", "-SA5008"]

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/becomeliminal/pgxporter

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
